name: CI

on:
  push:
    branches:
      - main
      - serverless
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter client lint

      - name: Test
        run: pnpm --filter client test

      - name: Build (includes data validation)
        run: pnpm run build

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level high
