name = "fremdmaps"
main = "worker/index.ts"
compatibility_date = "2026-06-16"

[assets]
binding = "ASSETS"
directory = "client/dist"
# Route every asset request through worker/index.ts so the shared response
# security headers apply to HTML, navigation data, images, and build assets.
run_worker_first = true
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
